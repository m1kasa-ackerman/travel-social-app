# ===========================
# SERVER
# ===========================
server.port=8080
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# ===========================
# DATABASE — Neon PostgreSQL (Pooler connection)
# ===========================
spring.datasource.url=jdbc:postgresql://ep-sweet-flower-a1btw9rf-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_nDY3b9veSPIg
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===========================
# JPA / Hibernate
# none = we manage schema manually via schema.sql
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===========================
# JWT
# ===========================
jwt.secret=V2FuZHJseVNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbjIwMjZTZWN1cmU=
jwt.expiration.ms=86400000
jwt.refresh.expiration.ms=604800000

# ===========================
# CORS
# ===========================
cors.allowed-origins=${FRONTEND_URL:https://*.vercel.app,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176}

# ===========================
# FILE UPLOAD
# ===========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===========================
# SECURITY / RATE LIMITING
# ===========================
rate.limit.requests=60
rate.limit.auth.requests=10
security.lockout.max-attempts=5
security.lockout.duration.minutes=15
